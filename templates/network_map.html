{% extends 'base.html' %}
{% block title %}Карта мережі | UIC-Manager{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    #map {
        height: calc(100vh - 140px);
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--tw-sidebar-border);
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        z-index: 1;
    }
    .leaflet-popup-content-wrapper {
        background-color: var(--tw-sidebar-bg);
        color: var(--tw-text);
        border: 1px solid var(--tw-sidebar-border);
        border-radius: 8px;
    }
</style>

<div class="container-fluid">
    <div class="dash-header mb-3">
        <h2 style="color: var(--tw-text);"><i class="bi bi-map-fill me-2" style="color: var(--tw-accent);"></i>Карта покриття та інфраструктури</h2>
    </div>
    <div id="map"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var map = L.map('map').setView([50.178, 30.315], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        var zones = [
            { coords: [50.178, 30.315], radius: 3500, color: '#0088cc', name: 'м. Васильків (Оптика/Центр)' },
            { coords: [50.141, 30.347], radius: 1800, color: '#00c853', name: 'с. Барахти' },
            { coords: [50.198, 30.297], radius: 1500, color: '#00c853', name: 'с. Путрівка' },
            { coords: [50.218, 30.320], radius: 1400, color: '#00c853', name: 'с. Зелений Бір' },
            { coords: [50.165, 30.280], radius: 1200, color: '#ffeb3b', name: 'с. Березанщина' },
            { coords: [50.230, 30.350], radius: 2000, color: '#00c853', name: 'с. Крушинка' },
            { coords: [50.185, 30.270], radius: 1600, color: '#00c853', name: 'с. Здорівка' },
            { coords: [50.170, 30.290], radius: 1000, color: '#ffeb3b', name: 'с. Безп\'ятне' },
            { coords: [50.150, 30.260], radius: 1100, color: '#00c853', name: 'с. Борисів' },
            { coords: [50.210, 30.250], radius: 1300, color: '#ffeb3b', name: 'с. Залізне' },
            { coords: [50.190, 30.330], radius: 1200, color: '#00c853', name: 'с. Заріччя' },
            { coords: [50.180, 30.250], radius: 1400, color: '#ffeb3b', name: 'с. Застугна' },
            { coords: [50.200, 30.370], radius: 1100, color: '#00c853', name: 'с. Кобці' }
        ];

        zones.forEach(function(zone) {
            L.circle(zone.coords, {
                color: zone.color, fillColor: zone.color, fillOpacity: 0.15, weight: 2, radius: zone.radius
            }).addTo(map).bindPopup("<strong style='color:" + zone.color + ";'>" + zone.name + "</strong>");
        });

        var serverIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3208/3208726.png',
            iconSize: [32, 32], iconAnchor: [16, 32]
        });

        var nodes = [
            { coords: [50.178, 30.315], title: 'Головна Серверна', desc: 'Васильків, Центр.' },
            { coords: [50.198, 30.297], title: 'Вузол розподілу №2', desc: 'Путрівка.' },
            { coords: [50.230, 30.350], title: 'Вузол розподілу №3', desc: 'Крушинка.' }
        ];

        nodes.forEach(function(node) {
            L.marker(node.coords, {icon: serverIcon}).addTo(map)
             .bindPopup("<b>" + node.title + "</b><br>" + node.desc);
        });
    });
</script>
{% endblock %}
