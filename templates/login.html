<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід до САП | UIC-Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px); /* Ефект розмиття фону */
        }
        .login-card {
            background: rgba(43, 61, 81, 0.9);
            color: white;
            padding: 30px;
            border-radius: 4px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .form-control { background: white; border: none; border-radius: 2px; margin-bottom: 15px; }
        .btn-login { background-color: #0088cc; color: white; border: none; border-radius: 2px; width: 100%; padding: 10px; font-weight: bold; }
        .btn-login:hover { background-color: #005580; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title text-center">Вхід до САП</div>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" class="form-control" placeholder="Введіть логін" required>
            <input type="password" name="password" class="form-control" placeholder="Введіть пароль" required>
            <button type="submit" class="btn-login">Увійти</button>
        </form>
        {% if form.errors %}
            <p class="text-danger small mt-3 text-center">Невірний логін або пароль</p>
        {% endif %}
    </div>
</body>
</html>
